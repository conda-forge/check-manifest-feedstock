{% set version = "0.51" %}

package:
  name: check-manifest
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/check-manifest/check_manifest-{{ version }}.tar.gz
  sha256: 9801c7637675755a563f33e3c48ee59a59b37a7677297c05c910c16c5b9b6d67

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - check-manifest = check_manifest:main

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - python-build >=0.1
    - setuptools
    - toml

test:
  imports:
    - check_manifest
  commands:
    - pip check
    - check-manifest --help
  requires:
    - pip
    - python {{ python_min }}


about:
  home: https://github.com/mgedmin/check-manifest
  license: MIT
  license_family: MIT
  license_file: LICENSE.rst
  summary: Check MANIFEST.in in a Python source package for completeness

extra:
  recipe-maintainers:
    - hodgsonw
    - ocefpaf
